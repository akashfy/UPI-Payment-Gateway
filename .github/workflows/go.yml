name: Go

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Format Check
      run: if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then echo "Format check failed. Please run 'gofmt -w .' locally."; exit 1; fi

    - name: Test
      run: go test ./...

    - name: Build
      run: go build -v ./...
